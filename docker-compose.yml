version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: goat_insurance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-GoatInsure@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-goat_insurance}
      MYSQL_USER: ${MYSQL_USER:-goat_admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-GoatAdmin@2024}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goat_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goat_insurance_api
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - goat_network

  nginx:
    image: nginx:alpine
    container_name: goat_insurance_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - upload_data:/var/www/uploads
    depends_on:
      - backend
    networks:
      - goat_network

volumes:
  mysql_data:
    driver: local
  upload_data:
    driver: local

networks:
  goat_network:
    driver: bridge
